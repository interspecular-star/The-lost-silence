<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TLS — Лаборатория стилей</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🧪</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      background: #07090d;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    #lab { display: flex; height: 100vh; }
    #lab-stage-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #04060a;
      overflow: hidden;
    }
    #lab-stage { position: relative; }
    #lab-panel {
      flex: 0 0 300px;
      border-left: 1px solid #1d242e;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #0b0f14;
      overflow-y: auto;
    }
    #lab-title { font-size: 12px; letter-spacing: 3px; color: #4fd1c5; }
    #lab-sub, #lab-hint { font-size: 11px; color: #5c6773; line-height: 1.5; }
    .lab-ctl { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: #9aa7b4; }
    .lab-ctl select {
      background: #101820; color: #e6edf3; border: 1px solid #2a3038;
      border-radius: 6px; padding: 6px 8px; font-size: 13px;
    }
    .lab-range { display: flex; align-items: center; gap: 8px; }
    .lab-range input { flex: 1; accent-color: #4fd1c5; }
    .lab-range span { font-size: 12px; color: #e6edf3; width: 26px; text-align: right; }
    #lab-sep {
      margin-top: 8px; padding-top: 12px; border-top: 1px solid #1d242e;
      font-size: 11px; letter-spacing: 3px; color: #4fd1c5;
    }
    .lab-check { flex-direction: row !important; align-items: center; gap: 8px !important; cursor: pointer; }
    .lab-check input { accent-color: #4fd1c5; }
  </style>
</head>
<body>
  <div id="lab"></div>
  <script type="module" src="/src/lab/main.ts"></script>
</body>
</html>
