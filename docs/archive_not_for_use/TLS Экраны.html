  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"72711e46-5e4c-49fe-a7f7-51449e42d2de\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<style>\nbody { margin: 0; background: #06090d; }\n@keyframes tls-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }\n<\u002Fstyle>\n<script src=\"710d1a9a-70ac-42fe-9640-9829758bacd9\"><\u002Fscript>\n<\u002Fhelmet>\n\n<section style=\"display: flex; gap: 100px; padding: 80px; align-items: flex-start; font-family: 'Segoe UI', system-ui, sans-serif; flex-wrap: wrap;\">\n\n  <!-- ============ 5a ЖУРНАЛ: 3 ВКЛАДКИ ============ -->\n  <div id=\"5a\" style=\"display: flex; flex-direction: column; gap: 24px; flex: 0 0 auto;\">\n    <div style=\"display: flex; align-items: baseline; gap: 16px;\">\n      <a href=\"#5a\" style=\"font-family: Consolas, ui-monospace, monospace; font-size: 15px; color: #4fd1c5; border: 1px solid rgba(79,209,197,0.4); padding: 3px 10px; text-decoration: none; letter-spacing: 2px;\">5a<\u002Fa>\n      <div style=\"color: #e6edf3; font-size: 20px; font-weight: 200; letter-spacing: 6px;\">ЖУРНАЛ: КВЕСТЫ / ФРАКЦИИ / АРХИВ<\u002Fdiv>\n      <div style=\"color: #5f7a8a; font-size: 14px; font-weight: 300;\">три вкладки в стиле «Тишина», вкладка «Квесты» активна<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-screen-label=\"5a Журнал\" style=\"position: relative; width: 1920px; height: 1080px; overflow: hidden; background: radial-gradient(ellipse 1400px 900px at 50% 38%, #101a21 0%, #060b10 60%, #030608 100%); outline: 1px solid rgba(255,255,255,0.08);\">\n\n      <!-- заголовок -->\n      <div style=\"position: absolute; top: 56px; left: 64px; color: #f2f6f5; font-size: 30px; font-weight: 200; letter-spacing: 10px;\">ЖУРНАЛ<\u002Fdiv>\n      <div style=\"position: absolute; top: 52px; right: 64px; width: 48px; height: 48px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.18); border-radius: 50%; color: #cfe8e5; font-size: 18px; opacity: 0.75; cursor: pointer;\">✕<\u002Fdiv>\n\n      <!-- вкладки -->\n      <div style=\"position: absolute; top: 150px; left: 64px; display: flex; gap: 56px;\">\n        <div style=\"color: #f2f6f5; font-size: 22px; font-weight: 300; letter-spacing: 4px; padding-bottom: 14px; border-bottom: 1px solid #4fd1c5; cursor: pointer;\">КВЕСТЫ<\u002Fdiv>\n        <div style=\"color: #cfe8e5; font-size: 22px; font-weight: 300; letter-spacing: 4px; padding-bottom: 14px; opacity: 0.5; cursor: pointer;\">ФРАКЦИИ<\u002Fdiv>\n        <div style=\"color: #cfe8e5; font-size: 22px; font-weight: 300; letter-spacing: 4px; padding-bottom: 14px; opacity: 0.5; cursor: pointer;\">АРХИВ OLDNET<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position: absolute; top: 210px; left: 64px; right: 64px; height: 1px; background: rgba(255,255,255,0.08);\"><\u002Fdiv>\n\n      <!-- содержимое: список квестов -->\n      <div style=\"position: absolute; top: 250px; left: 64px; right: 64px; bottom: 64px; display: flex; flex-direction: column; gap: 22px;\">\n\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 26px 30px; border: 1px solid rgba(79,209,197,0.3); background: rgba(79,209,197,0.05);\">\n          <div style=\"flex: 0 0 130px; font-family: Consolas, ui-monospace, monospace; font-size: 12px; color: #4fd1c5; letter-spacing: 3px; padding-top: 4px;\">СЮЖЕТ<\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <div style=\"color: #f2f6f5; font-size: 22px; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px;\">Наладить связи<\u002Fdiv>\n            <div style=\"color: #aebfca; font-size: 17px; font-weight: 300; line-height: 1.6; text-wrap: pretty;\">Познакомьтесь с техником Рен в ангаре — Матису нужен второй голос за вас, чтобы откалибровать Осколок.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex: 0 0 200px; text-align: right; color: #5f7a8a; font-size: 14px; font-family: Consolas, ui-monospace, monospace; letter-spacing: 1px; padding-top: 4px;\">В ПРОЦЕССЕ<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 26px 30px; border: 1px solid rgba(229,192,123,0.35); background: rgba(229,192,123,0.05);\">\n          <div style=\"flex: 0 0 130px; font-family: Consolas, ui-monospace, monospace; font-size: 12px; color: #e5c07b; letter-spacing: 3px; padding-top: 4px;\">СЮЖЕТ<\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <div style=\"color: #f2f6f5; font-size: 22px; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px;\">Первая правда<\u002Fdiv>\n            <div style=\"color: #aebfca; font-size: 17px; font-weight: 300; line-height: 1.6; text-wrap: pretty;\">Расшифруйте фрагмент OldNet и узнайте, что скрывает официальная история.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex: 0 0 200px; text-align: right; color: #98c379; font-size: 14px; font-family: Consolas, ui-monospace, monospace; letter-spacing: 1px; padding-top: 4px;\">ГОТОВО К СДАЧЕ<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; align-items: flex-start; gap: 28px; padding: 26px 30px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);\">\n          <div style=\"flex: 0 0 130px; font-family: Consolas, ui-monospace, monospace; font-size: 12px; color: #5f7a8a; letter-spacing: 3px; padding-top: 4px;\">ЕЖЕДНЕВНЫЙ<\u002Fdiv>\n          <div style=\"flex: 1;\">\n            <div style=\"color: #e6edf3; font-size: 22px; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px;\">Контракт дня: доверие кочевника<\u002Fdiv>\n            <div style=\"color: #aebfca; font-size: 17px; font-weight: 300; line-height: 1.6; text-wrap: pretty;\">Поддерживайте отношения с Матисом (10+). Flux Nomads платят за надёжных.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex: 0 0 200px; text-align: right; color: #5f7a8a; : flex; flex-direction: column; gap: 24px; flex: 0 0 auto;\">\n    <div style=\"display: flex; align-items: baseline; gap: 16px;\">\n      <a href=\"#1b\" style=\"font-family: Consolas, ui-monospace, monospace; font-size: 15px; color: #4fd1c5; border: 1px solid rgba(79,209,197,0.4); padding: 3px 10px; text-decoration: none; letter-spacing: 2px;\">1b<\u002Fa>\n      <div style=\"color: #e6edf3; font-size: 20px; font-weight: 200; letter-spacing: 6px;\">ТИШИНА: ВОЗДУХ<\u002Fdiv>\n      <div style=\"color: #5f7a8a; font-size: 14px; font-weight: 300;\">радикальный минимализм — пустота как материал, HUD почти исчезает, тёплый сбой как единственный акцент<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-screen-label=\"1b Игровой экран\" style=\"position: relative; width: 1920px; height: 1080px; overflow: hidden; background: radial-gradient(ellipse 1400px 900px at 50% 38%, #101a21 0%, #060b10 60%, #030608 100%); outline: 1px solid rgba(255,255,255,0.08);\">\n      <!-- одинокий тёплый сбой в холодном мире -->\n      \n\n      <!-- HUD: обычное расположение сверху, лёгкий воздушный стиль -->\n      <div style=\"position: absolute; top: 56px; left: 64px; display: flex; align-items: center; gap: 22px;\">\n        <div style=\"width: 52px; height: 52px; display: grid; place-items: center; color: #4fd1c5; font-size: 22px; opacity: 0.85; cursor: pointer;\">◈<\u002Fdiv>\n        <div style=\"width: 48px; height: 48px; display: grid; place-items: center; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: #aebfca; font-size: 18px; font-weight: 300;\">3<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <span style=\"font-family: Consolas, ui-monospace, monospace; font-size: 12px; color: #5f7a8a; letter-spacing: 2px; width: 32px;\">HP<\u002Fspan>\n            <div style=\"width: 180px; height: 5px; background: rgba(255,255,255,0.08);\"><div style=\"width: 76%; height: 100%; background: #e06c75; opacity: 0.85;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 10px;\">\n            <span style=\"font-family: Consolas, ui-monospace, monospace; font-size: 12px; color: #5f7a8a; letter-spacing: 2px; width: 32px;\">FOC<\u002Fspan>\n            <div style=\"width: 180px; height: 5px; background: rgba(255,255,255,0.08);\"><div style=\"width: 52%; height: 100%; background: #7db8f0; opacity: 0.85;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 48px; height: 48px; display: grid; place-items: center; font-size: 19px; opacity: 0.75; cursor: pointer;\">🎒<\u002Fdiv>\n        <div style=\"width: 48px; height: 48px; display: grid; place-items: center; font-size: 19px; opacity: 0.75; cursor: pointer;\">📋<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position: absolute; top: 56px; right: 64px; display: flex; align-items: center; gap: 10px; opacity: 0.85;\">\n        <span style=\"color: #e5c07b; font-size: 20px;\">⌬<\u002Fspan>\n        <span style=\"font-family: Consolas, ui-monospace, monospace; color: #e5c07b; font-size: 18px; letter-spacing: 1px;\">128<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- НАРРАТИВ: узкая центральная колонна, максимум воздуха -->\n      <div style=\"position: absolute; top: 130px; left: 50%; transform: translateX(-50%); width: 820px; text-align: center;\">\n        <div style=\"color: #5f7a8a; font-size: 16px; font-weight: 300; letter-spacing: 10px; margin-bottom: 44px;\">АНГАР FLUX NOMADS<\u002Fdiv><div style=\"color: #aebfca; font-size: 29px; font-weight: 300; line-height: 0.9; text-wrap: pretty; text-decoration-line: none; font-style: normal; position: static\">Ангар гудит: сварка, лебёдки, чей-то смех.<br><br>Рабочий город на колёсах, а не витрина.<\u002Fdiv>\n        \n      <\u002Fdiv>\n\n      <!-- ДЕЙСТВИЯ: тихие строки над зоной диалога, скрываются при открытом диалоге -->\n      <div style=\"position: absolute; left: 50%; transform: translateX(-50%); bottom: 660px; display: flex; gap: 72px; opacity: 0.35;\">\n        <div style=\"color: #cfe8e5; font-size: 21px; font-weight: 300; letter-spacing: 2px; border-bottom: 1px solid rgba(79,209,197,0.4); padding: 10px 4px; min-height: 44px; cursor: pointer;\">Матис зовёт к верстаку<\u002Fdiv>\n        <div style=\"color: #cfe8e5; font-size: 21px; font-weight: 300; letter-spacing: 2px; border-bottom: 1px solid rgba(79,209,197,0.4); padding: 10px 4px; min-height: 44px; cursor: pointer;\">Техник у соседнего стенда<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ДИАЛОГ: парящая карта, много поля -->\n      <div style=\"position: absolute; left: 50%; transform: translateX(-50%); bottom: 72px; width: 1458px; background: rgba(8,14,20,0.92); border: 1px solid rgba(255,255,255,0.08); border-top: 1px solid rgba(79,209,197,0.35); padding: 44px 64px 36px; display: flex; flex-direction: column; gap: 26px\">\n        <div style=\"display: flex; align-items: center; gap: 22px; width: 1423px\">\n          <div style=\"width: 72px; height: 72px; border-radius: 50%; border: 1px solid rgba(79,209,197,0.5); background: radial-gradient(circle at 50% 38%, #26303a, #12181f); display: grid; place-items: center; overflow: hidden;\">\n            <svg width=\"54\" height=\"54\" viewBox=\"0 0 96 96\"><circle cx=\"48\" cy=\"36\" r=\"16\" fill=\"#3a4754\"><\u002Fcircle><path d=\"M18 88 Q22 58 48 58 Q74 58 78 88 Z\" fill=\"#3a4754\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n            <div style=\"color: #4fd1c5; font-size: 19px; font-weight: 400; letter-spacing: 7px;\">МАТИС<\u002Fdiv>\n            <div style=\"width: 180px; height: 3px; background: rgba(255,255,255,0.08);\"><div style=\"width: 58%; height: 100%; background: linear-gradient(90deg, #e06c75, #e5c07b, #98c379);\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"color: #e6edf3; font-size: 26px; font-weight: 300; line-height: 1.7; text-wrap: pretty; width: 1423px\">Узел числился мёртвым в реестрах. «Утраченная единица». А у тебя даже Mesh-сигнатуры нет. Ты хоть знаешь, какой сейчас год?<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 4px; margin-top: 6px; width: 1423px\">\n          <div style=\"display: flex; align-items: center; gap: 18px; min-height: 52px; padding: 8px 18px; color: #cfe8e5; font-size: 21px; font-weight: 300; cursor: pointer;\">\n            <span style=\"color: #98c379; font-size: 13px; width: 18px;\">▲<\u002Fspan> «2034… или чуть позже. Сколько я проспал?»\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 18px; min-height: 52px; padding: 8px 18px; color: #cfe8e5; font-size: 21px; font-weight: 300; cursor: pointer;\">\n            <span style=\"color: #e06c75; font-size: 13px; width: 18px;\">▼<\u002Fspan> «Отойди от капсулы. Кто ты такой?»\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: center; gap: 18px; min-height: 52px; padding: 8px 18px; background: rgba(79,209,197,0.1); border-left: 2px solid #4fd1c5; color: #e6edf3; font-size: 21px; font-weight: 300; cursor: pointer;\">\n            <span style=\"color: #5f7a8a; font-size: 13px; width: 18px;\">◇<\u002Fspan> Молчать. Слушать тишину — впервые за 600 лет.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; gap: 40px; font-family: Consolas, ui-monospace, monospace; font-size: 14px; color: #5f7a8a; line-height: 1.7; max-width: 1920px;\">\n      <div style=\"flex: 1;\">— нарратив: узкая центральная колонна, огромные поля — «тишина = воздух»<br>— HUD сжат в левую кромку: полоски HP/FOC вертикальные, валюта повёрнута<\u002Fdiv>\n      <div style=\"flex: 1;\">— действия гаснут (opacity), когда открыт диалог — конфликт снят состоянием<br>— единственный тёплый акцент — пульсирующий «сбой»
